# There is no index file. GitHub Pages serves README.md as the home page and
# wraps it in _layouts/default.html via jekyll-readme-index,
# jekyll-optional-front-matter and jekyll-default-layout, which it enables
# server-side. Listing them under `plugins` is not required.
#
# jekyll-sitemap is different: it ships with the github-pages gem but is NOT
# enabled automatically, so it must be listed under `plugins` below. Without it
# /sitemap.xml returns 404 and there is nothing to submit to Search Console.

title:               Hansol Shin | 신한솔
url:                 https://hansol-s.github.io
baseurl:             ""

plugins:
  - jekyll-sitemap

markdown:            kramdown

exclude:             ['LICENSE', 'Gemfile', 'Gemfile.lock', 'vendor/bundle']

permalink:           pretty

sass:
  sass_dir:          _sass
  style:             :compressed
